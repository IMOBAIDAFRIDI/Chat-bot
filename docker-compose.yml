version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_chatbot_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: aichatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_chatbot_backend
    restart: always
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: "postgresql://postgres:postgrespassword@postgres:5432/aichatbot?schema=public"
      JWT_SECRET: "production_secret_jwt_key_987654321"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-YOUR_API_KEY}"
    ports:
      - "5000:5000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_chatbot_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
